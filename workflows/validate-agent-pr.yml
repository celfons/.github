name: Validate Agent PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check PR references a SAST issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Look for issue references in the PR body
            // Accepted formats: #123, https://github.com/.../issues/123, closes #123, fixes #123
            const issueRefPattern = /(close[sd]?|fix(?:e[sd])?|resolve[sd]?)?\s*#(\d+)|github\.com\/[^/]+\/[^/]+\/issues\/(\d+)/gi;
            const matches = [...body.matchAll(issueRefPattern)];

            if (matches.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '## ⚠️ Missing SAST Issue Reference',
                  '',
                  'This pull request does not appear to reference a SAST issue.',
                  '',
                  'If this PR is a security fix, please link it to the corresponding issue by adding one of the following to the PR description:',
                  '',
                  '```',
                  'Closes #<issue-number>',
                  'Fixes #<issue-number>',
                  '```',
                  '',
                  'If this PR is **not** a security fix (e.g., a rule update without a linked issue), you may ignore this warning.',
                  '',
                  '> This check is advisory only. It does not block merging.',
                ].join('\n'),
              });

              // Set a warning output but do not fail the workflow
              core.warning('PR does not reference a SAST issue. See PR comment for details.');
            } else {
              core.info(`PR references issue(s): ${matches.map(m => m[0]).join(', ')}`);
            }
