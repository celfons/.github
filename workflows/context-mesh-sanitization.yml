name: Context Mesh Sanitization

# ──────────────────────────────────────────────────────────────────────────────
# Runs weekly (Sunday 00:00 UTC) to review merged PRs from the past 7 days,
# extract new code patterns, and update context-mesh/knowledge-base.md.
# A Pull Request is opened for human review before the changes are merged.
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:       # Allow manual trigger for testing

jobs:
  sanitize:
    name: Update Knowledge Base from Weekly PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Collect merged PRs from the past 7 days ─────────────────────
      - name: Fetch merged PRs from the past week
        id: fetch-prs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000); // 604 800 000 ms

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 50,
            });

            const recent = prs.filter(pr =>
              pr.merged_at && new Date(pr.merged_at) >= oneWeekAgo
            );

            const summary = recent.map(pr => ({
              number: pr.number,
              title: pr.title,
              // Truncate body to ~200 tokens (800 chars) to stay within per-PR budget
              body: (pr.body || '').substring(0, 800),
              merged_at: pr.merged_at,
            }));

            fs.writeFileSync('/tmp/weekly-prs.json', JSON.stringify(summary, null, 2));

            core.info(`Found ${summary.length} PR(s) merged in the past week`);
            core.setOutput('pr_count', String(summary.length));

      # ── Step 2: Build updated knowledge base via gpt-4o ─────────────────────
      - name: Build updated knowledge base
        id: update-kb
        if: steps.fetch-prs.outputs.pr_count != '' && steps.fetch-prs.outputs.pr_count != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured."
            exit 1
          fi

          # Trim current knowledge base to 3000 tokens
          python3 context-mesh/scripts/trim-context.py \
            context-mesh/knowledge-base.md --max-tokens 3000 > /tmp/trimmed-kb.txt

          # Build OpenAI payload
          cat > /tmp/build-sanitize-payload.py << 'PYEOF'
          import json, os

          with open('/tmp/weekly-prs.json') as f:
              prs = json.load(f)

          with open('/tmp/trimmed-kb.txt') as f:
              current_kb = f.read()

          pr_text = "\n\n".join([
              f"### PR #{pr['number']}: {pr['title']}\n"
              f"Merged: {pr['merged_at']}\n\n"
              f"{pr['body']}"
              for pr in prs
          ])

          payload = {
              "model": "gpt-4o",
              "max_tokens": 3000,
              "temperature": 0.1,
              "messages": [
                  {
                      "role": "system",
                      "content": (
                          "You are a knowledge base curator. Given the current knowledge base "
                          "and recently merged PRs, produce a fully updated knowledge base in Markdown. "
                          "Rules: "
                          "1) Add new code patterns or conventions discovered from the PRs. "
                          "2) Remove obvious redundancies and merge duplicate rules. "
                          "3) Preserve all important existing knowledge. "
                          "4) Keep the document concise and well-structured. "
                          "5) Preserve the '<!-- weekly-patterns-start/end -->' markers. "
                          "Return ONLY the complete updated Markdown content, no preamble."
                      )
                  },
                  {
                      "role": "user",
                      "content": (
                          f"## Current Knowledge Base\n\n{current_kb}\n\n"
                          f"## Merged PRs from Past Week\n\n{pr_text}"
                      )
                  }
              ]
          }

          with open('/tmp/sanitize-payload.json', 'w') as f:
              json.dump(payload, f)
          PYEOF
          python3 /tmp/build-sanitize-payload.py

          curl -sf https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            --data @/tmp/sanitize-payload.json \
            -o /tmp/sanitize-response.json

          python3 << 'PYEOF'
          import json, sys

          with open('/tmp/sanitize-response.json') as f:
              data = json.load(f)

          if 'error' in data:
              print(f"::error::OpenAI API error: {data['error'].get('message', 'Unknown')}")
              sys.exit(1)

          updated_kb = data['choices'][0]['message']['content'].strip()

          with open('context-mesh/knowledge-base.md', 'w') as f:
              f.write(updated_kb + '\n')

          print(f"Knowledge base updated ({len(updated_kb)} chars)")
          PYEOF

      # ── Step 3: Open a PR with the sanitized knowledge base ──────────────────
      - name: Open sanitization pull request
        if: steps.fetch-prs.outputs.pr_count != '' && steps.fetch-prs.outputs.pr_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_COUNT: ${{ steps.fetch-prs.outputs.pr_count }}
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const today = new Date().toISOString().split('T')[0];
            const branchName = `context-mesh/sanitize-${today}`;

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git checkout -b ${branchName}`);
            execSync('git add context-mesh/knowledge-base.md');

            const staged = execSync('git diff --cached --name-only').toString().trim();
            if (!staged) {
              core.info('Knowledge base unchanged this week. No PR needed.');
              return;
            }

            execSync(
              `git commit -m "chore: weekly context-mesh knowledge base sanitization (${today})"`
            );

            const repoUrl = `https://x-access-token:${process.env.GH_TOKEN}@github.com/${context.repo.owner}/${context.repo.repo}`;
            execSync(`git remote set-url origin ${repoUrl}`);
            execSync(`git push origin ${branchName}`);

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: weekly knowledge base sanitization (${today})`,
              body: [
                '## 🧹 Context Mesh Sanitization',
                '',
                `Reviewed **${process.env.PR_COUNT}** merged PR(s) from the past week.`,
                '',
                '### Changes',
                '- New code patterns extracted from recent PRs added to the knowledge base',
                '- Redundant or obsolete rules consolidated',
                '',
                '### Files Changed',
                '- `context-mesh/knowledge-base.md`',
                '',
                '> ⚠️ Auto-generated. Review the diff carefully before merging.',
              ].join('\n'),
              head: branchName,
              base: context.payload.repository
                ? context.payload.repository.default_branch
                : 'main',
            });

            core.info(`Sanitization PR created: ${pr.data.html_url}`);

      - name: No-op when no PRs were merged this week
        if: steps.fetch-prs.outputs.pr_count == '0' || steps.fetch-prs.outputs.pr_count == ''
        run: |
          echo "No PRs merged in the past week. Knowledge base unchanged."
